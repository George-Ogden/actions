name: Run Prek on All Files

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_call:

jobs:
  run-prek:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Load entire cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/
          key: prek

      - name: Install latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python dependencies
        run: |
          uv tool install prek --cache-dir ~/.cache/uv
          uv pip install pyyaml --system --cache-dir ~/.cache/uv --upgrade

      - name: Setup and run prek
        run: |
          SKIP=$(python - <<'EOF'
          import yaml
          with open(".pre-commit-config.yaml") as f:
              config = yaml.safe_load(f)
          print(",".join(config.get("ci", {}).get("skip", [])))
          EOF
          )
          export SKIP
          prek run -av
