name: Check for version in known file

on:
  workflow_call:
    inputs:
      prefix:
        required: false
        type: string
      filename:
        required: true
        type: string

jobs:
  check-for-version:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check version in file
        run: |
          grep -Fz -- "${{ inputs.prefix }}$(cat version.txt)" "${{ inputs.filename }}"
