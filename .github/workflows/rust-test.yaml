name: Run Rust Tests

on:
  workflow_call:

jobs:
  run-cargo-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build with Cargo
        run: |
          cargo build

      - name: Run Tests with Cargo
        run: |
          cargo test --workspace --all-targets
